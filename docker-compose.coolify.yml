# Backend image built once, reused by api + workers
x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile
  restart: always
  depends_on:
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  volumes:
    - ./temp_uploads:/app/temp_uploads

services:
  # ── Infrastructure (Chỉ giữ Redis và Minio trên App Server) ──

  redis:
    image: redis:7-alpine
    container_name: arkon_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-arkon_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-arkon_secret} ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: arkon_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    # Đã đổi sang dải cổng cao để tránh xung đột vật lý trên máy chủ .203
    ports:
      - "19002:9000"
      - "19003:9001"
    # Cập nhật lệnh Healthcheck an toàn hơn cho MinIO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application ───────────────────────────────────────────────

  migrator:
    <<: *backend
    container_name: arkon_migrator
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *backend
    container_name: arkon_api
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # LUẬT BẮT BUỘC: Bypass Proxy đâm thẳng cổng vật lý
    ports:
      - "5055:5055"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 5055 --proxy-headers --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5055/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *backend
    container_name: arkon_worker
    command: python -m arq app.worker.WorkerSettings
    depends_on:
      api:
        condition: service_healthy

  worker_skills:
    <<: *backend
    container_name: arkon_worker_skills
    command: python -m arq app.worker.SkillWorkerSettings
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5055}
    container_name: arkon_frontend
    restart: always
    # LUẬT BẮT BUỘC: Bypass Proxy đâm thẳng cổng vật lý
    ports:
      - "3119:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5055}
      - INTERNAL_API_URL=http://api:5055
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  minio_data:
